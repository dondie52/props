<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col justify-center items-center p-gutter">
<!-- Login Container -->
<main class="w-full max-w-[480px] space-y-md">
<!-- Branding Section -->
<div class="text-center space-y-sm mb-lg">
<div class="inline-flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="domain" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<h1 class="text-h3 font-h3 font-bold text-primary">PropManage BW</h1>
<p class="text-on-surface-variant font-body-sm">Operational clarity for property professionals.</p>
</div>
<!-- Centered Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant shadow-sm rounded-lg p-lg">
<h2 class="text-h2 font-h2 text-on-surface mb-md">Login</h2>
<form action="#" class="space-y-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Email Address</label>
<input class="h-[44px] px-sm rounded border border-outline-variant bg-surface-bright focus:border-primary focus:ring-1 focus:ring-primary outline-none text-body-md transition-all placeholder:text-outline" id="email" name="email" placeholder="manager@propmanage.bw" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-[44px] px-sm rounded border border-outline-variant bg-surface-bright focus:border-primary focus:ring-1 focus:ring-primary outline-none text-body-md transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Primary Login CTA -->
<button class="w-full h-[48px] bg-primary-container text-on-primary font-bold rounded shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
                    Login
                </button>
</form>
<!-- Social/Integration Option (Visual Flair) -->
<div class="mt-lg relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-caps">
<span class="bg-surface-container-lowest px-sm text-on-surface-variant font-label-caps">Institutional Login</span>
</div>
</div>
<div class="mt-md">
<button class="w-full h-[44px] bg-surface-bright border border-outline-variant text-on-surface font-bold rounded hover:bg-surface-container-low transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="shield">shield</span>
                    Single Sign-On (SSO)
                </button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center pt-md">
<p class="text-on-surface-variant font-body-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Register</a>
</p>
</div>
</main>
<!-- Side Visual Support (For Desktop/Wide screens - Layout Contrast) -->
<div class="hidden lg:block fixed left-xl bottom-xl max-w-sm">
<div class="bg-surface-container-high/50 p-md rounded-xl border border-outline-variant/30 backdrop-blur-sm">
<div class="flex items-center gap-sm mb-sm text-secondary">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<span class="font-label-caps text-label-caps">System Status</span>
</div>
<p class="text-body-sm text-on-surface-variant italic">
                "Our real-time ledger sync is now active across all Botswana regional nodes. Secure access verified."
            </p>
</div>
</div>
<!-- Image for Context (Modern Real Estate Imagery) -->
<div class="hidden xl:block fixed right-0 top-0 h-full w-1/3">
